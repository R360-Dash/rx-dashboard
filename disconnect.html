<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBooks Disconnected — RacquetX Dashboard</title>
<style>
body{font-family:'Source Sans 3','Segoe UI',system-ui,sans-serif;margin:0;padding:0;background:linear-gradient(135deg,#0D2B29 0%,#1B4D4A 40%,#2D7A6F 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#0D2B29}
.card{background:#fff;border-radius:20px;padding:48px 40px;max-width:480px;width:92%;box-shadow:0 24px 64px rgba(0,0,0,.3);text-align:center}
.icon{width:64px;height:64px;background:#E8F0ED;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
h1{font-size:24px;color:#1B4D4A;margin:0 0 8px}
p{font-size:14px;color:#7BA69E;line-height:1.6;margin:8px 0}
.btn{display:inline-block;margin-top:24px;padding:12px 28px;background:linear-gradient(135deg,#1B4D4A,#2D7A6F);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:14px;transition:transform .15s}
.btn:hover{transform:translateY(-1px)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h1>Disconnected from QuickBooks</h1>
  <p>The RacquetX Dashboard has been disconnected from your QuickBooks Online account. Financial data will no longer be refreshed until the connection is restored.</p>
  <p style="font-size:12px;color:#A8C5BE;margin-top:16px">If this was unintentional, contact your administrator to reconnect.</p>
  <a href="/rx-dashboard/" class="btn">Return to Dashboard</a>
</div>
</body>
</html>
